{% extends "django_chromadb_viz/base.html" %}

{% block title %}Error - ChromaDB Viz{% endblock %}

{% block content %}
<div class="row">
    <div class="col-12">
        <div class="text-center py-5">
            <i class="bi bi-exclamation-triangle display-1 text-danger"></i>
            <h1 class="mt-4">Error</h1>
            <p class="lead text-muted">Something went wrong while processing your request.</p>
            
            {% if error %}
                <div class="alert alert-danger text-start">
                    <h5>Error Details:</h5>
                    <pre class="mb-0">{{ error }}</pre>
                </div>
            {% endif %}
            
            <div class="mt-4">
                <a href="{% url 'django_chromadb_viz:collection_list' %}" class="btn btn-primary">
                    <i class="bi bi-house"></i> Go to Collections
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
